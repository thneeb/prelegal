services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - prelegal_data:/data
    env_file:
      - .env
    environment:
      # Override in .env with a long random string in production
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    restart: unless-stopped

volumes:
  prelegal_data:
